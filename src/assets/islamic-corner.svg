<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#0F2424" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <g stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none" transform="translate(300,300)">
    <!-- Base large circles -->
    <circle r="250" stroke-dasharray="6 12" opacity="0.3"/>
    <circle r="230" opacity="0.2"/>
    <circle r="280" opacity="0.1"/>
    
    <!-- Giant 8-Pointed Star -->
    <path d="M0 -280 L40 -120 L200 -200 L120 -40 L280 0 L120 40 L200 200 L40 120 L0 280 L-40 120 L-200 200 L-120 40 L-280 0 L-120 -40 L-200 -200 L-40 -120 Z" />
    
    <!-- Mid 8-Pointed Star -->
    <path d="M0 -180 L25 -70 L130 -130 L70 -25 L180 0 L70 25 L130 130 L25 70 L0 180 L-25 70 L-130 130 L-70 25 L-180 0 L-70 -25 L-130 -130 L-25 -70 Z" fill="url(#fade)" />

    <!-- Innermost Octagon/Star -->
    <path d="M0 -80 L20 -20 L80 0 L20 20 L0 80 L-20 20 L-80 0 L-20 -20 Z" fill="rgba(255,255,255,0.03)"/>
    
    <circle r="120" opacity="0.3"/>
    <circle r="60" stroke-width="1.5" stroke-dasharray="10 5"/>
    <circle r="20" fill="rgba(255,255,255,0.05)"/>
  </g>
</svg>
